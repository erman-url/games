<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Cockpit PRO</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}

#cockpit {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<img id="cockpit" src="image/cockpit.png" />
<audio id="bgSound" src="image/sound-space1.mp3" loop></audio>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ======================
   📱 MOBILE DETECT
====================== */
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

/* ======================
   ⭐ PERFORMANCE WATCHDOG
====================== */
let fps = 60;
let frameCount = 0;
let lastFpsTime = performance.now();
let quality = isMobile ? 0.7 : 1;

/* ======================
   ⭐ CAMERA DRIFT
====================== */
let camDriftX = 0;
let camDriftY = 0;

/* ======================
   ⭐ STARFIELD
====================== */
let STAR_COUNT = Math.floor((isMobile ? 220 : 400) * quality);
let stars = [];

function createStar(){
  return {
    x: (Math.random()-0.5)*2000,
    y: (Math.random()-0.5)*2000,
    z: Math.random()*2000 + 1,
    prevZ: 0,
    layer: Math.random()
  };
}

function generateStars(){
  stars = [];
  for(let i=0;i<STAR_COUNT;i++){
    stars.push(createStar());
  }
}
generateStars();

/* ======================
   METEOR
====================== */
const meteorImg = new Image();
meteorImg.src = "image/m1.png";

let meteor = null;
let meteorPhase = 0;
let meteorTimer = 30 * 60;

function spawnMeteor(){
  const fromLeft = Math.random() > 0.3;
  const depth = Math.random();
  const angle = (Math.random() - 0.5) * 0.4;

  meteor = {
    x: fromLeft ? -200 : w + 200,
    y: Math.random() * h * 0.6,
    vx: Math.cos(angle) * (0.5 + depth),
    vy: Math.sin(angle) * (1 + depth),
    size: 50 + depth * 100,
  };
}

/* ======================
   PLANET
====================== */
const planetImg = new Image();
planetImg.src = "image/a1.png";

let planet = null;
let planetPhase = 0;
let planetTimer = 60 * 60;

function spawnPlanet(){
  const fromLeft = Math.random() > 0.5;

  planet = {
    x: fromLeft ? -400 : w + 400,
    y: h * 0.2,
    dir: fromLeft ? 1 : -1,
    speed: isMobile ? 0.4 : 0.6,
    size: Math.min(w,h) * 0.7
  };
}

/* ======================
   GYRO (FULL FIX)
====================== */
let yaw = 0;
let targetYaw = 0;

function startGyro(){

  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {

    DeviceOrientationEvent.requestPermission()
      .then(res=>{
        if(res==="granted"){
          window.addEventListener("deviceorientation", handleGyro);
        }
      });

  } else {
    window.addEventListener("deviceorientation", handleGyro);
  }
}

function handleGyro(e){
  let tilt = e.gamma || 0;
  tilt = Math.max(-45, Math.min(45, tilt));
  targetYaw = tilt * 0.0025;
}

/* ======================
   AUDIO + START
====================== */
let started = false;

function startExperience(){
  if(started) return;
  started = true;

  const audio = document.getElementById("bgSound");
  audio.volume = 0.5;
  audio.play().catch(()=>{});

  startGyro();
}

/* 🔥 TOUCH FIX (ÇAKIŞMA YOK) */
window.addEventListener("touchstart", (e)=>{
  startExperience();
  isWarp = true;
}, { passive: true });

window.addEventListener("touchend", ()=>{
  isWarp = false;
});

window.addEventListener("click", startExperience);

/* ======================
   WARP
====================== */
let baseSpeed = isMobile ? 3 : 4;
let warpSpeed = isMobile ? 9 : 20;
let speed = baseSpeed;
let isWarp = false;

window.addEventListener("mousedown", ()=> isWarp = true);
window.addEventListener("mouseup", ()=> isWarp = false);

/* ======================
   FOV
====================== */
let baseFov = 300;
let warpFov = 600;
let currentFov = baseFov;

/* ======================
   UPDATE
====================== */
function update(){

  yaw += (targetYaw - yaw) * 0.08;

  camDriftX += (Math.random()-0.5)*0.02;
  camDriftY += (Math.random()-0.5)*0.02;

  camDriftX *= 0.98;
  camDriftY *= 0.98;

  speed += ((isWarp ? warpSpeed : baseSpeed) - speed) * 0.05;
  currentFov += ((isWarp ? warpFov : baseFov) - currentFov) * 0.05;

  stars.forEach(s=>{
    s.prevZ = s.z;
    s.z -= speed * (0.5 + s.layer);

    if(s.z <= 1){
      s.x = (Math.random()-0.5)*2000;
      s.y = (Math.random()-0.5)*2000;
      s.z = 2000;
    }

    const cos = Math.cos(yaw);
    const sin = Math.sin(yaw);

    const x = s.x * cos - s.z * sin;
    const z = s.x * sin + s.z * cos;

    s.x = x;
    s.z = z;
  });

  if(meteorPhase === 0 && --meteorTimer <= 0){
    spawnMeteor();
    meteorPhase = 1;
  }

  if(meteor){
    meteor.x += meteor.vx;
    meteor.y += meteor.vy;

    if(meteor.x < -300 || meteor.x > w+300 || meteor.y < -200 || meteor.y > h+200){
      meteor = null;
    }
  }

  if(planetPhase === 0 && --planetTimer <= 0){
    spawnPlanet();
    planetPhase = 1;
  }

  if(planet){
    planet.x += planet.dir * planet.speed;

    if(planet.x < -500 || planet.x > w+500){
      planet = null;
    }
  }

  /* AUTO PERFORMANCE */
  frameCount++;
  let now = performance.now();

  if(now - lastFpsTime > 1000){
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;

    if(fps < 40){
      STAR_COUNT = Math.max(120, STAR_COUNT * 0.85);
      generateStars();
    }
  }
}

/* ======================
   DRAW
====================== */
function draw(){

  ctx.clearRect(0,0,w,h);

  ctx.fillStyle = "white";

  stars.forEach(s=>{
    const scale = currentFov / s.z;

    const x = s.x * scale + w/2 + camDriftX;
    const y = s.y * scale + h/2 + camDriftY;

    if(x<0 || x>w || y<0 || y>h) return;

    if(isWarp && !isMobile){
      ctx.fillRect(x,y,2,2);
    } else {
      ctx.fillRect(x,y,2,2);
    }
  });

  if(planet){
    ctx.drawImage(planetImg, planet.x, planet.y, planet.size, planet.size);
  }

  if(meteor){
    ctx.drawImage(meteorImg, meteor.x, meteor.y, meteor.size, meteor.size);
  }
}

/* ======================
   LOOP (SAFE)
====================== */
function loop(){
  try{
    update();
    draw();
  } catch(e){
    console.log("loop error", e);
  }
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
