<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Cockpit PRO</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}

#cockpit {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<img id="cockpit" src="image/cockpit.png" />
<audio id="radioCall" src="image/radiocall.mp3"></audio>
<audio id="bgSound" src="image/sound-space1.mp3" loop></audio>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ====================== */
let started = false;

let w,h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ====================== */
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

/* ====================== */
let fps = 60;
let frameCount = 0;
let lastFpsTime = performance.now();
let quality = isMobile ? 0.7 : 1;

/* ====================== */
let camDriftX = 0;
let camDriftY = 0;

/* ====================== */
let STAR_COUNT = Math.floor((isMobile ? 220 : 400) * quality);
let stars = [];

function createStar(){
  return {
    x: (Math.random()-0.5)*2000,
    y: (Math.random()-0.5)*2000,
    z: Math.random()*2000 + 1,
    prevZ: 0,
    layer: Math.random()
  };
}

function generateStars(){
  stars = [];
  for(let i=0;i<STAR_COUNT;i++){
    stars.push(createStar());
  }
}
generateStars();

/* ======================
   🔫 BULLET SYSTEM (PRO)
====================== */
let bullets = [];

function createBullet(side){
  return {
    x: side === "left" ? -70 : 70,

    // 🎯 MERKEZ HEDEF
    targetX: 0,

    // 🎯 DOĞAL EĞİM
    curve: (Math.random() - 0.5) * 0.3,

    z: 60,
    speed: 35,
    size: 4
  };
}

function shoot(){
  bullets.push(createBullet("left"));
  bullets.push(createBullet("right"));
  if(bullets.length > 200) bullets.shift();
}

/* ====================== */
let isFiring = false;
let lastShot = 0;
let fireRate = 120;

/* ====================== */
let meteor = null;
let meteorTimer = 120;

function spawnMeteor(){
  meteor = {
    x: (Math.random()-0.5)*600,
    y: (Math.random()-0.5)*300,
    z: 2000,
    speed: 10 + Math.random()*6,
    size: 120 + Math.random()*100,
    rot: Math.random()*Math.PI,
    rotSpeed: (Math.random()-0.5)*0.1
  };
}

/* ====================== */
let particles = [];

function createExplosion(x,y){
  for(let i=0;i<25;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      life:30+Math.random()*20
    });
  }
}

/* ====================== */
const planetImg = new Image();
planetImg.src = "image/a1.png";

let planet = null;
let planetPhase = 0;
let planetTimer = 60 * 60;

function spawnPlanet(){
  const fromLeft = Math.random() > 0.5;

  planet = {
    x: fromLeft ? -400 : w + 400,
    y: h * 0.2,
    dir: fromLeft ? 1 : -1,
    speed: isMobile ? 0.4 : 0.6,
    size: Math.min(w,h) * 0.7
  };
}

/* ====================== */
let yaw = 0;
let targetYaw = 0;

function startGyro(){
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {

    DeviceOrientationEvent.requestPermission()
      .then(res=>{
        if(res==="granted"){
          window.addEventListener("deviceorientation", handleGyro);
        }
      });

  } else {
    window.addEventListener("deviceorientation", handleGyro);
  }
}

function handleGyro(e){
  let tilt = e.gamma || 0;
  tilt = Math.max(-45, Math.min(45, tilt));
  targetYaw = tilt * 0.0025;
}

/* ====================== */
function startExperience(){
  if(started) return;
  started = true;

  const radio = document.getElementById("radioCall");
  const bg = document.getElementById("bgSound");

  radio.volume = 1;
  bg.volume = 0;

  radio.play()
  .then(()=>{
    radio.addEventListener("ended", () => {
      bg.play().catch(()=>{});
      let fade = setInterval(()=>{
        if(bg.volume < 0.5) bg.volume += 0.02;
        else clearInterval(fade);
      }, 100);
    }, { once: true });
  })
  .catch(()=>{
    bg.volume = 0.5;
    bg.play().catch(()=>{});
  });

  startGyro();
}

/* ====================== */
window.addEventListener("touchstart", ()=>{
  startExperience();
  isWarp = true;
  isFiring = true;
}, { passive: true });

window.addEventListener("touchend", ()=>{
  isWarp = false;
  isFiring = false;
});

window.addEventListener("mousedown", ()=>{
  isWarp = true;
  isFiring = true;
});

window.addEventListener("mouseup", ()=>{
  isWarp = false;
  isFiring = false;
});

window.addEventListener("click", (e)=>{
  if(isMobile) return;
  startExperience();
});

/* ====================== */
let baseSpeed = isMobile ? 3 : 4;
let warpSpeed = isMobile ? 9 : 20;
let speed = baseSpeed;
let isWarp = false;

/* ====================== */
let baseFov = 300;
let warpFov = 600;
let currentFov = baseFov;

/* ====================== */
function update(){

  yaw += (targetYaw - yaw) * 0.08;

  camDriftX += (Math.random()-0.5)*0.02;
  camDriftY += (Math.random()-0.5)*0.02;

  camDriftX *= 0.98;
  camDriftY *= 0.98;

  speed += ((isWarp ? warpSpeed : baseSpeed) - speed) * 0.05;
  currentFov += ((isWarp ? warpFov : baseFov) - currentFov) * 0.05;

  let now = performance.now();
  if(isFiring && now - lastShot > fireRate){
    shoot();
    lastShot = now;
  }

  /* 🔫 BULLETS (PRO FİZİK) */
  bullets.forEach((b,i)=>{

    b.z += b.speed;

    // 🎯 MERKEZE YAKLAŞMA
    b.x += (b.targetX - b.x) * 0.08;

    // 🎯 DOĞAL SAPMA
    b.x += b.curve;
    b.curve *= 0.98;

    if(b.z > 2000) bullets.splice(i,1);
  });

  if(!meteor && --meteorTimer <= 0){
    spawnMeteor();
    meteorTimer = 180;
  }

  if(meteor){
    meteor.z -= meteor.speed;
    meteor.rot += meteor.rotSpeed;

    if(meteor.z < 50){
      meteor = null;
    }
  }

  bullets.forEach((b,bi)=>{
    if(!meteor) return;

    let dx = b.x - meteor.x;
    let dz = b.z - meteor.z;

    if(dx*dx + dz*dz < 8000){
      createExplosion(w/2,h/2);
      meteor = null;
      bullets.splice(bi,1);
    }
  });

  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if(p.life <= 0) particles.splice(i,1);
  });

  stars.forEach(s=>{
    s.z -= speed * (0.5 + s.layer);
    if(s.z <= 1){
      s.x = (Math.random()-0.5)*2000;
      s.y = (Math.random()-0.5)*2000;
      s.z = 2000;
    }
  });
}

/* ====================== */
function draw(){

  ctx.clearRect(0,0,w,h);

  ctx.fillStyle = "white";

  stars.forEach(s=>{
    const scale = currentFov / s.z;
    const x = s.x * scale + w/2;
    const y = s.y * scale + h/2;
    ctx.fillRect(x,y,2,2);
  });

  /* 🔫 BULLETS (PRO DRAW) */
  bullets.forEach(b=>{
    const scale = currentFov / b.z;

    const x = b.x * scale + w/2;

    // 🎯 PERSPEKTİF FIX
    const y = h * 0.75 - (scale * 25);

    ctx.fillStyle = "rgba(255,60,60,0.95)";
    ctx.fillRect(x, y, b.size, b.size * 6);

    // glow
    ctx.fillStyle = "rgba(255,120,120,0.4)";
    ctx.fillRect(x-1, y, b.size+2, b.size*8);
  });

  if(meteor){
    const scale = currentFov / meteor.z;
    const x = meteor.x * scale + w/2;
    const y = meteor.y * scale + h/2;
    const size = meteor.size * scale;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(meteor.rot);

    ctx.fillStyle="#5a4a3f";
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const ang = i*(Math.PI*2/8);
      const r = size*(0.7+Math.random()*0.3);
      ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
    }
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  particles.forEach(p=>{
    ctx.fillStyle="orange";
    ctx.fillRect(p.x,p.y,3,3);
  });
}

/* ====================== */
function loop(){
  try{
    update();
    draw();
  } catch(e){
    console.log("loop error", e);
  }
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
