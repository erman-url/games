<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Cockpit PRO</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}

#cockpit {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<img id="cockpit" src="image/cockpit.png" />
<audio id="bgSound" src="image/sound-space1.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ======================
   STARFIELD
====================== */
const STAR_COUNT = 800;
const stars = [];

function createStar(){
  return {
    x: (Math.random()-0.5)*2000,
    y: (Math.random()-0.5)*2000,
    z: Math.random()*2000 + 1,
    prevZ: 0
  };
}

for(let i=0;i<STAR_COUNT;i++){
  stars.push(createStar());
}

/* ======================
   METEOR SYSTEM (FIX + EFFECT)
====================== */
const meteorImg = new Image();
meteorImg.src = "image/m1.png";

let meteor = null;

let meteorPhase = 0;
let meteorTimer = 30 * 60;

function spawnMeteor(){
  const fromLeft = Math.random() > 0.3;
  const depth = Math.random();
  const angle = (Math.random() - 0.5) * 0.4;

  meteor = {
    x: fromLeft ? -200 : w + 200,
    y: Math.random() * h * 0.6,
    vx: Math.cos(angle) * (0.8 + depth * 1.5) * (fromLeft ? 1 : -1),
    vy: Math.sin(angle) * (1 + depth * 2),
    size: 60 + depth * 140,
   
  };
}

/* ======================
   GYRO CONTROL
====================== */
let yaw = 0;
let targetYaw = 0;

function startGyro(){
  window.addEventListener("deviceorientation", e=>{
    let tilt = e.gamma || 0;
    tilt = Math.max(-45, Math.min(45, tilt));
    targetYaw = tilt * 0.0025;
  });
}

/* ======================
   SES + START
====================== */
let started = false;

function startExperience(){
  if(started) return;
  started = true;

  const audio = document.getElementById("bgSound");
  audio.volume = 0.5;
  audio.play().catch(()=>{});

  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(res=>{
        if(res==="granted") startGyro();
      });
  } else {
    startGyro();
  }
}

window.addEventListener("click", startExperience);
window.addEventListener("touchstart", startExperience);

/* ======================
   WARP CONTROL
====================== */
let baseSpeed = 4;
let warpSpeed = 20;
let speed = baseSpeed;

let isWarp = false;

window.addEventListener("mousedown", ()=> isWarp = true);
window.addEventListener("mouseup", ()=> isWarp = false);

window.addEventListener("touchstart", ()=> isWarp = true);
window.addEventListener("touchend", ()=> isWarp = false);

/* ======================
   FOV CONTROL
====================== */
let baseFov = 300;
let warpFov = 700;
let currentFov = baseFov;

/* ======================
   LOOP
====================== */
function update(){

  yaw += (targetYaw - yaw) * 0.08;

  if(isWarp){
    speed += (warpSpeed - speed) * 0.1;
  } else {
    speed += (baseSpeed - speed) * 0.1;
  }

  if(isWarp){
    currentFov += (warpFov - currentFov) * 0.08;
  } else {
    currentFov += (baseFov - currentFov) * 0.08;
  }

  /* ⭐ STARS */
  stars.forEach(s=>{
    s.prevZ = s.z;

    s.z -= speed;

    if(s.z <= 1){
      s.x = (Math.random()-0.5)*2000;
      s.y = (Math.random()-0.5)*2000;
      s.z = 2000;
      s.prevZ = s.z;
    }

    const cos = Math.cos(yaw);
    const sin = Math.sin(yaw);

    const x = s.x * cos - s.z * sin;
    const z = s.x * sin + s.z * cos;

    s.x = x;
    s.z = z;
  });

  /* ☄️ METEOR EVENT */
  if(meteorPhase === 0){
    meteorTimer--;
    if(meteorTimer <= 0){
      spawnMeteor();
      meteorPhase = 1;
    }
  }

  else if(meteorPhase === 1){
    if(!meteor){
      meteorPhase = 2;
      meteorTimer = 180 * 60;
    }
  }

  else if(meteorPhase === 2){
    meteorTimer--;
    if(meteorTimer <= 0){
      spawnMeteor();
      meteorPhase = 3;
    }
  }

  /* ☄️ METEOR UPDATE (FIXED) */
  if(meteor){

    meteor.x += meteor.vx;
    meteor.y += meteor.vy;



    if(
      meteor.x < -300 || 
      meteor.x > w + 300 ||
      meteor.y < -200 ||
      meteor.y > h + 200
    ){
      meteor = null;
    }
  }
}

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "white";
  ctx.fillStyle = "white";

  /* ⭐ STARS */
  stars.forEach(s=>{
    const fov = currentFov;

    const scale = fov / s.z;
    const prevScale = fov / s.prevZ;

    const x = s.x * scale + w/2;
    const y = s.y * scale + h/2;

    const px = s.x * prevScale + w/2;
    const py = s.y * prevScale + h/2;

    if(x<0 || x>w || y<0 || y>h) return;

    if(isWarp){
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(x, y);
      ctx.stroke();
    } else {
      const size = (1 - s.z / 2000) * 3;
      ctx.fillRect(x,y,size,size);
    }
  });

  /* ☄️ METEOR DRAW (FULL EFFECT) */
  if(meteor){



    // ✨ GLOW
    const glow = ctx.createRadialGradient(
      meteor.x, meteor.y, 0,
      meteor.x, meteor.y, meteor.size
    );

    glow.addColorStop(0, "rgba(255,200,100,0.9)");
    glow.addColorStop(1, "rgba(255,100,0,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(meteor.x, meteor.y, meteor.size, 0, Math.PI*2);
    ctx.fill();

    // 🚀 METEOR
    ctx.drawImage(
      meteorImg,
      meteor.x,
      meteor.y,
      meteor.size,
      meteor.size
    );
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
