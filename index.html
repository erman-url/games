<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPACE RUNNER ULTRA</title>

<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:system-ui;}
#gameCanvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#cockpit{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;pointer-events:none;z-index:5;}
#hud{position:fixed;top:10px;left:10px;color:#0ff;z-index:10;}
#menu{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20;}
.btn{padding:12px 24px;margin:10px;background:#0ff;color:#000;border-radius:8px;font-weight:bold;}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>
<img src="image/cockpit.png" id="cockpit">

<div id="hud">SCORE: <span id="score">0</span></div>

<div id="menu">
  <h2 style="color:#0ff">SPACE RUNNER</h2>
  <div class="btn" onclick="startGame()">START</div>
  <div class="btn" onclick="setWeapon('laser')">LASER</div>
  <div class="btn" onclick="setWeapon('spread')">SPREAD</div>
  <div class="btn" onclick="setWeapon('charge')">CHARGE</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* STATE */
let game = {
  running:false,
  weapon:"laser",
  score:0,
  speed:8,
  playerX:canvas.width/2,
  targetX:canvas.width/2,
  bullets:[],
  meteors:[],
  stars:[],
  shake:0,
  charging:false,
  chargePower:0
};

/* AUDIO UNLOCK (KRİTİK) */
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let unlocked=false;

function unlockAudio(){
  if(unlocked) return;
  const buffer = audioCtx.createBuffer(1,1,22050);
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start(0);
  unlocked=true;
}

function playShoot(){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=600;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.07);
}

/* MENU */
function startGame(){
  unlockAudio();
  document.getElementById("menu").style.display="none";
  game.running=true;
}

function setWeapon(w){
  game.weapon=w;
}

/* STARS */
for(let i=0;i<120;i++){
  game.stars.push({
    x:(Math.random()-0.5)*canvas.width,
    y:(Math.random()-0.5)*canvas.height,
    z:Math.random()*canvas.width
  });
}

function updateStars(){
  for(let s of game.stars){
    s.z -= game.speed;
    if(s.z<=1){
      s.x=(Math.random()-0.5)*canvas.width;
      s.y=(Math.random()-0.5)*canvas.height;
      s.z=canvas.width;
    }
  }
}

function drawStars(){
  for(let s of game.stars){
    let sc=200/s.z;
    let x=s.x*sc+canvas.width/2;
    let y=s.y*sc+canvas.height/2;
    ctx.fillStyle="#fff";
    ctx.fillRect(x,y,2,2);
  }
}

/* METEOR */
function spawnMeteor(){
  game.meteors.push({
    x:(Math.random()-0.5)*canvas.width,
    y:(Math.random()-0.5)*canvas.height,
    z:canvas.width,
    size:20+Math.random()*40
  });
}
setInterval(spawnMeteor,600);

function updateMeteors(){
  for(let m of game.meteors){
    m.z -= game.speed;
    if(m.z<1) m.remove=true;
  }
  game.meteors=game.meteors.filter(m=>!m.remove);
}

function drawMeteors(){
  for(let m of game.meteors){
    let sc=300/m.z;
    let x=m.x*sc+canvas.width/2;
    let y=m.y*sc+canvas.height/2;
    let size=m.size*sc;

    let shade = 100 + (300/m.z)*40;
    ctx.fillStyle=`rgb(${shade},${shade},${shade})`;

    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();
  }
}

/* SHOOT */
function shoot(){
  playShoot();
  if(navigator.vibrate) navigator.vibrate(10);

  let cx=game.playerX-canvas.width/2;

  if(game.weapon==="laser"){
    game.bullets.push({x:cx,y:80,z:0,speed:30});
  }

  if(game.weapon==="spread"){
    for(let i=-1;i<=1;i++){
      game.bullets.push({x:cx+i*20,y:80,z:0,speed:25});
    }
  }

  if(game.weapon==="charge"){
    let power=game.chargePower||1;
    game.bullets.push({x:cx,y:80,z:0,speed:20,size:power*2});
    game.chargePower=0;
  }
}

/* INPUT FIX */
canvas.addEventListener("touchstart",(e)=>{
  unlockAudio();

  if(game.weapon==="charge"){
    game.charging=true;
  }else{
    shoot();
  }
});

canvas.addEventListener("touchend",()=>{
  if(game.weapon==="charge"){
    shoot();
    game.charging=false;
  }
});

canvas.addEventListener("click",()=>{
  unlockAudio();
  if(game.weapon!=="charge") shoot();
});

/* BULLETS */
function updateBullets(){
  for(let b of game.bullets){
    b.z += b.speed;
  }
  game.bullets=game.bullets.filter(b=>b.z<canvas.width);
}

function drawBullets(){
  for(let b of game.bullets){
    let sc=300/(canvas.width-b.z);
    let x=b.x*sc+canvas.width/2;
    let y=b.y*sc+canvas.height-120;

    ctx.fillStyle="#0ff";
    ctx.fillRect(x,y,4*(b.size||1),12*(b.size||1));
  }
}

/* COLLISION */
function checkCollision(){
  for(let m of game.meteors){
    let sc=300/m.z;
    let mx=m.x*sc+canvas.width/2;
    let my=m.y*sc+canvas.height/2;
    let size=m.size*sc;

    for(let b of game.bullets){
      let bs=300/(canvas.width-b.z);
      let bx=b.x*bs+canvas.width/2;
      let by=b.y*bs+canvas.height-120;

      let dx=mx-bx;
      let dy=my-by;

      if(dx*dx+dy*dy < size*size){
        m.hit=true;
        b.hit=true;
        game.score+=10;
        game.shake=5;
      }
    }
  }

  game.meteors=game.meteors.filter(m=>!m.hit);
  game.bullets=game.bullets.filter(b=>!b.hit);
}

/* EFFECT */
function applyShake(){
  if(game.shake>0){
    let dx=(Math.random()-0.5)*game.shake;
    let dy=(Math.random()-0.5)*game.shake;
    canvas.style.transform=`translate(${dx}px,${dy}px)`;
    game.shake*=0.8;
  } else {
    canvas.style.transform="translate(0,0)";
  }
}

/* LOOP */
function loop(){
  if(!game.running){
    requestAnimationFrame(loop);
    return;
  }

  if(game.charging) game.chargePower+=0.1;

  game.playerX += (game.targetX-game.playerX)*0.1;

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  updateStars(); drawStars();
  updateMeteors(); drawMeteors();
  updateBullets(); drawBullets();
  checkCollision();

  applyShake();

  document.getElementById("score").innerText=game.score;

  requestAnimationFrame(loop);
}

loop();

/* MOVE */
canvas.addEventListener("touchmove",(e)=>{
  game.targetX = e.touches[0].clientX;
});

/* AUTO FIRE */
setInterval(()=>{
  if(game.running && game.weapon!=="charge") shoot();
},250);

</script>
</body>
</html>
