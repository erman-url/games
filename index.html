<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Cockpit PRO</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}

#cockpit {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<img id="cockpit" src="image/cockpit.png" />
<audio id="bgSound" src="image/sound-space1.mp3" loop></audio>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ======================
   📱 MOBILE DETECT (EN ÜSTE ALINDI)
====================== */
const isMobile = /Mobi|Android/i.test(navigator.userAgent);

/* ======================
   ⭐ PRO CAMERA DRIFT
====================== */
let camDriftX = 0;
let camDriftY = 0;

/* ======================
   ⭐ STARFIELD (PARALLAX)
====================== */
let STAR_COUNT = isMobile ? 280 : 400; // 🔥 FIX
let stars = [];

function createStar(){
  return {
    x: (Math.random()-0.5)*2000,
    y: (Math.random()-0.5)*2000,
    z: Math.random()*2000 + 1,
    prevZ: 0,
    layer: Math.random()
  };
}

function generateStars(){
  stars = [];
  for(let i=0;i<STAR_COUNT;i++){
    stars.push(createStar());
  }
}

generateStars();

/* ======================
   METEOR SYSTEM
====================== */
const meteorImg = new Image();
meteorImg.onload = () => console.log("meteor loaded");
meteorImg.src = "image/m1.png";

let meteor = null;
let meteorPhase = 0;
let meteorTimer = 30 * 60;

function spawnMeteor(){
  const fromLeft = Math.random() > 0.3;
  const depth = Math.random();
  const angle = (Math.random() - 0.5) * 0.4;

  meteor = {
    x: fromLeft ? -200 : w + 200,
    y: Math.random() * h * 0.6,
    vx: Math.cos(angle) * (0.6 + depth * 1.2), // 🔥 daha stabil
    vy: Math.sin(angle) * (1 + depth * 1.5),
    size: 50 + depth * 120,
  };
}

/* ======================
   PLANET SYSTEM
====================== */
const planetImg = new Image();
planetImg.onload = () => console.log("planet loaded");
planetImg.src = "image/a1.png";

let planet = null;
let planetPhase = 0;
let planetTimer = 60 * 60;

function spawnPlanet(){
  const fromLeft = Math.random() > 0.5;

  planet = {
    x: fromLeft ? -400 : w + 400,
    y: h * 0.2,
    dir: fromLeft ? 1 : -1,
    speed: isMobile ? 0.4 : 0.6, // 🔥 mobil yavaş
    size: Math.min(w,h) * 0.7
  };
}

/* ======================
   GYRO
====================== */
let yaw = 0;
let targetYaw = 0;

function startGyro(){
  window.addEventListener("deviceorientation", e=>{
    let tilt = e.gamma || 0;
    tilt = Math.max(-45, Math.min(45, tilt));
    targetYaw = tilt * 0.0025;
  });
}

/* ======================
   AUDIO
====================== */
let started = false;

function startExperience(){
  if(started) return;
  started = true;

  const audio = document.getElementById("bgSound");
  audio.volume = 0.5;
  audio.play().catch(()=>{});

  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(res=>{
        if(res==="granted") startGyro();
      });
  } else {
    startGyro();
  }
}

window.addEventListener("click", startExperience);
window.addEventListener("touchstart", startExperience);

/* ======================
   WARP
====================== */
let baseSpeed = isMobile ? 3 : 4;
let warpSpeed = isMobile ? 12 : 20;
let speed = baseSpeed;
let isWarp = false;

window.addEventListener("mousedown", ()=> isWarp = true);
window.addEventListener("mouseup", ()=> isWarp = false);
window.addEventListener("touchstart", ()=> isWarp = true);
window.addEventListener("touchend", ()=> isWarp = false);

/* ======================
   FOV
====================== */
let baseFov = 300;
let warpFov = 700;
let currentFov = baseFov;

/* ======================
   LOOP
====================== */
function update(){

  yaw += (targetYaw - yaw) * 0.08;

  // ⭐ DRIFT (FIX)
  camDriftX += (Math.random()-0.5)*0.05;
  camDriftY += (Math.random()-0.5)*0.05;

  // ⭐ SPEED
  if(isWarp){
    speed += (warpSpeed - speed) * 0.08;
  } else {
    speed += (baseSpeed - speed) * 0.08;
  }

  // ⭐ FOV
  if(isWarp){
    currentFov += (warpFov - currentFov) * 0.06;
  } else {
    currentFov += (baseFov - currentFov) * 0.06;
  }

  // ⭐ STARS
  stars.forEach(s=>{
    s.prevZ = s.z;

    s.z -= speed * (0.5 + s.layer);

    if(s.z <= 1){
      s.x = (Math.random()-0.5)*2000;
      s.y = (Math.random()-0.5)*2000;
      s.z = 2000;
      s.prevZ = s.z;
    }

    const cos = Math.cos(yaw);
    const sin = Math.sin(yaw);

    const x = s.x * cos - s.z * sin;
    const z = s.x * sin + s.z * cos;

    s.x = x;
    s.z = z;
  });

  // ⭐ METEOR
  if(meteorPhase === 0){
    meteorTimer--;
    if(meteorTimer <= 0){
      spawnMeteor();
      meteorPhase = 1;
    }
  }

  if(meteor){
    meteor.x += meteor.vx;
    meteor.y += meteor.vy;

    if(meteor.x < -300 || meteor.x > w+300 || meteor.y < -200 || meteor.y > h+200){
      meteor = null;
    }
  }

  // ⭐ PLANET
  if(planetPhase === 0){
    planetTimer--;
    if(planetTimer <= 0){
      spawnPlanet();
      planetPhase = 1;
    }
  }

  if(planet){
    planet.x += planet.dir * planet.speed;

    if(planet.x < -500 || planet.x > w+500){
      planet = null;
      planetPhase = 2;
    }
  }
}

function draw(){

  // ⭐ SAFE MOTION BLUR
  ctx.fillStyle = isMobile ? "rgba(0,0,0,0.1)" : "rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "white";
  ctx.fillStyle = "white";

  stars.forEach(s=>{
    const fov = currentFov;

    const scale = fov / s.z;
    const prevScale = fov / s.prevZ;

    const x = s.x * scale + w/2 + camDriftX;
    const y = s.y * scale + h/2 + camDriftY;

    const px = s.x * prevScale + w/2;
    const py = s.y * prevScale + h/2;

    if(x<0 || x>w || y<0 || y>h) return;

    if(isWarp){
      ctx.lineWidth = 1; // 🔥 FIX
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(x, y);
      ctx.stroke();
    } else {
      const size = (1 - s.z / 2000) * (1 + s.layer*2);
      ctx.fillRect(x,y,size,size);
    }
  });

  if(planet){
    ctx.drawImage(planetImg, planet.x, planet.y, planet.size, planet.size);
  }

  if(meteor){
    ctx.drawImage(meteorImg, meteor.x, meteor.y, meteor.size, meteor.size);
  }
}

/* ======================
   FPS LIMIT
====================== */
let last = 0;

function loop(t){
  if(t - last > 16){
    update();
    draw();
    last = t;
  }
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
