<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Cockpit PRO</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}

#cockpit {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<img id="cockpit" src="image/cockpit.png" />
<audio id="bgSound" src="image/sound-space1.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ======================
   STARFIELD
====================== */
const STAR_COUNT = 800;
const stars = [];

function createStar(){
  return {
    x: (Math.random()-0.5)*2000,
    y: (Math.random()-0.5)*2000,
    z: Math.random()*2000 + 1,
    prevZ: 0
  };
}

for(let i=0;i<STAR_COUNT;i++){
  stars.push(createStar());
}

/* ======================
   GYRO CONTROL
====================== */
let yaw = 0;
let targetYaw = 0;

function startGyro(){
  window.addEventListener("deviceorientation", e=>{
    let tilt = e.gamma || 0;
    tilt = Math.max(-45, Math.min(45, tilt));
    targetYaw = tilt * 0.0025;
  });
}

/* ======================
   SES + START
====================== */
let started = false;

function startExperience(){
  if(started) return;
  started = true;

  const audio = document.getElementById("bgSound");
  audio.volume = 0.5;
  audio.play().catch(()=>{});

  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(res=>{
        if(res==="granted") startGyro();
      });
  } else {
    startGyro();
  }
}

window.addEventListener("click", startExperience);
window.addEventListener("touchstart", startExperience);

/* ======================
   WARP CONTROL
====================== */
let baseSpeed = 4;
let warpSpeed = 20;
let speed = baseSpeed;

let isWarp = false;

window.addEventListener("mousedown", ()=> isWarp = true);
window.addEventListener("mouseup", ()=> isWarp = false);

window.addEventListener("touchstart", ()=> isWarp = true);
window.addEventListener("touchend", ()=> isWarp = false);

/* ======================
   LOOP
====================== */
function update(){

  yaw += (targetYaw - yaw) * 0.08;

  // hız geçişi (smooth)
  if(isWarp){
    speed += (warpSpeed - speed) * 0.1;
  } else {
    speed += (baseSpeed - speed) * 0.1;
  }

  stars.forEach(s=>{

    s.prevZ = s.z;

    s.z -= speed;

    if(s.z <= 1){
      s.x = (Math.random()-0.5)*2000;
      s.y = (Math.random()-0.5)*2000;
      s.z = 2000;
      s.prevZ = s.z;
    }

    // SENİN ROTASYONUN (DOKUNMADIM)
    const cos = Math.cos(yaw);
    const sin = Math.sin(yaw);

    const x = s.x * cos - s.z * sin;
    const z = s.x * sin + s.z * cos;

    s.x = x;
    s.z = z;
  });
}

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle = "white";
  ctx.fillStyle = "white";

  stars.forEach(s=>{

    const fov = 300;

    const scale = fov / s.z;
    const prevScale = fov / s.prevZ;

    const x = s.x * scale + w/2;
    const y = s.y * scale + h/2;

    const px = s.x * prevScale + w/2;
    const py = s.y * prevScale + h/2;

    if(x<0 || x>w || y<0 || y>h) return;

    if(isWarp){
      // ✨ WARP ÇİZGİSİ
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(x, y);
      ctx.stroke();
    } else {
      const size = (1 - s.z / 2000) * 3;
      ctx.fillRect(x,y,size,size);
    }
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
