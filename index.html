<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Cockpit PRO</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}

/* 🎯 KOKPIT OVERLAY */
#cockpit {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- ✅ KOKPIT PNG -->
<img id="cockpit" src="image/cockpit.png" />

<!-- 🔊 SES -->
<audio id="bgSound" src="image/sound-space1.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ======================
   STARFIELD
====================== */
const STAR_COUNT = 800;
const stars = [];

function createStar(){
  return {
    x: (Math.random()-0.5)*2000,
    y: (Math.random()-0.5)*2000,
    z: Math.random()*2000 + 1
  };
}

for(let i=0;i<STAR_COUNT;i++){
  stars.push(createStar());
}

/* ======================
   GYRO CONTROL
====================== */
let yaw = 0;
let targetYaw = 0;

function startGyro(){
  window.addEventListener("deviceorientation", e=>{
    let tilt = e.gamma || 0;
    tilt = Math.max(-45, Math.min(45, tilt));
    targetYaw = tilt * 0.0025;
  });
}

/* ======================
   SES + GYRO AKTİVASYON
====================== */
let started = false;

function startExperience(){
  if(started) return;
  started = true;

  // 🔊 ses başlat (mobil fix)
  const audio = document.getElementById("bgSound");
  audio.volume = 0.5;
  audio.play().catch(()=>{});

  // 📱 gyro başlat
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(res=>{
        if(res==="granted") startGyro();
      });
  } else {
    startGyro();
  }
}

window.addEventListener("click", startExperience);
window.addEventListener("touchstart", startExperience);

/* ======================
   MOVEMENT
====================== */
let speed = 4;

/* ======================
   LOOP
====================== */
function update(){

  // smooth dönüş
  yaw += (targetYaw - yaw) * 0.08;

  stars.forEach(s=>{

    s.z -= speed;

    if(s.z <= 1){
      s.x = (Math.random()-0.5)*2000;
      s.y = (Math.random()-0.5)*2000;
      s.z = 2000;
    }

    // gerçek rotasyon
    const cos = Math.cos(yaw);
    const sin = Math.sin(yaw);

    const x = s.x * cos - s.z * sin;
    const z = s.x * sin + s.z * cos;

    s.x = x;
    s.z = z;
  });
}

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,w,h);

  ctx.fillStyle = "white";

  stars.forEach(s=>{
    const fov = 300;
    const scale = fov / s.z;

    const x = s.x * scale + w/2;
    const y = s.y * scale + h/2;

    if(x<0 || x>w || y<0 || y>h) return;

    const size = (1 - s.z / 2000) * 3;
    ctx.fillRect(x,y,size,size);
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
