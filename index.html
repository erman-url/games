<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPACE RUNNER ULTRA</title>

<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:system-ui;}
#gameCanvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#cockpit{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;pointer-events:none;z-index:5;}
#hud{position:fixed;top:10px;left:10px;color:#0ff;z-index:10;}
#menu{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20;}
.btn{padding:12px 24px;margin:10px;background:#0ff;color:#000;border-radius:8px;font-weight:bold;}
#fireBtn{position:fixed;bottom:60px;right:25px;width:80px;height:80px;border-radius:50%;background:rgba(0,255,255,0.25);z-index:15;}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>
<img src="image/cockpit.png" id="cockpit">
<div id="fireBtn"></div>

<div id="hud">SCORE: <span id="score">0</span></div>

<div id="menu">
  <h2 style="color:#0ff">SPACE RUNNER</h2>
  <div class="btn" onclick="startGame()">START</div>
  <div class="btn" onclick="setWeapon('laser')">LASER</div>
  <div class="btn" onclick="setWeapon('spread')">SPREAD</div>
  <div class="btn" onclick="setWeapon('charge')">CHARGE</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* STATE */
let game = {
  running:false,
  weapon:"laser",
  score:0,
  speed:8,
  playerX:canvas.width/2,
  targetX:canvas.width/2,
  bullets:[],
  meteors:[],
  stars:[],
  debris:[], // 💥 YENİ
  shake:0,
  charging:false,
  chargePower:0,
  bgObject:null
};

/* AUDIO */
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let unlocked=false;

function unlockAudio(){
  if(unlocked) return;
  const buffer = audioCtx.createBuffer(1,1,22050);
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start(0);
  unlocked=true;
}

function playShoot(){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=600;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.07);
}

/* MENU */
function startGame(){
  unlockAudio();
  document.getElementById("menu").style.display="none";
  game.running=true;
  initGyro();
}

function setWeapon(w){
  game.weapon=w;
}

/* STARS */
for(let i=0;i<120;i++){
  game.stars.push({
    x:(Math.random()-0.5)*canvas.width,
    y:(Math.random()-0.5)*canvas.height,
    z:Math.random()*canvas.width
  });
}

function updateStars(){
  for(let s of game.stars){
    s.z -= game.speed;
    if(s.z<=1){
      s.x=(Math.random()-0.5)*canvas.width;
      s.y=(Math.random()-0.5)*canvas.height;
      s.z=canvas.width;
    }
  }
}

function drawStars(){
  for(let s of game.stars){
    let sc=200/s.z;
    let x=s.x*sc+canvas.width/2;
    let y=s.y*sc+canvas.height/2;
    ctx.fillStyle="#fff";
    ctx.fillRect(x,y,2,2);
  }
}

/* METEOR */
function spawnMeteor(){
  game.meteors.push({
    x:(Math.random()-0.5)*canvas.width,
    y:(Math.random()-0.5)*canvas.height,
    z:canvas.width,
    size:20+Math.random()*40
  });
}
setInterval(spawnMeteor,600);

function updateMeteors(){
  for(let m of game.meteors){
    m.z -= game.speed;
    if(m.z<1) m.remove=true;
  }
  game.meteors=game.meteors.filter(m=>!m.remove);
}

function drawMeteors(){
  for(let m of game.meteors){
    let sc=300/m.z;
    let x=m.x*sc+canvas.width/2;
    let y=m.y*sc+canvas.height/2;
    let size=m.size*sc;

    ctx.fillStyle="#888";
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();
  }
}

/* 🔫 SHOOT FIX */
function shoot(){
  playShoot();
  if(navigator.vibrate) navigator.vibrate(10);

  let cx = game.playerX - canvas.width/2;

  game.bullets.push({x:cx-14,y:90,z:0,speed:32});
  game.bullets.push({x:cx+14,y:90,z:0,speed:32});
}

/* INPUT */
canvas.addEventListener("touchstart",()=>{unlockAudio();shoot();});
canvas.addEventListener("click",()=>{unlockAudio();shoot();});
document.getElementById("fireBtn").addEventListener("touchstart",shoot);

/* BULLETS */
function updateBullets(){
  for(let b of game.bullets){
    b.z += b.speed;
  }
  game.bullets=game.bullets.filter(b=>b.z<canvas.width);
}

function drawBullets(){
  for(let b of game.bullets){
    let sc=300/(canvas.width-b.z);
    let x=b.x*sc+canvas.width/2;
    let y=(canvas.height-140)-(b.z*0.6);

    ctx.fillStyle="#0ff";
    ctx.fillRect(x,y,4,12);
  }
}

/* 💥 COLLISION + PARÇALANMA */
function checkCollision(){
  for(let m of game.meteors){

    let ms=300/m.z;
    let mx=m.x*ms+canvas.width/2;
    let my=m.y*ms+canvas.height/2;
    let mSize=m.size*ms;

    for(let b of game.bullets){

      let bs=300/(canvas.width-b.z);
      let bx=b.x*bs+canvas.width/2;
      let by=(canvas.height-140)-(b.z*0.6);

      let dx=mx-bx;
      let dy=my-by;

      if(dx*dx+dy*dy < mSize*mSize){

        m.hit=true;
        b.hit=true;
        game.score+=10;

        for(let i=0;i<8;i++){
          game.debris.push({
            x:mx,
            y:my,
            vx:(Math.random()-0.5)*6,
            vy:(Math.random()-0.5)*6,
            life:30
          });
        }
      }
    }
  }

  game.meteors=game.meteors.filter(m=>!m.hit);
  game.bullets=game.bullets.filter(b=>!b.hit);
}

/* 💥 DEBRIS */
function updateDebris(){
  for(let d of game.debris){
    d.x+=d.vx;
    d.y+=d.vy;
    d.life--;
  }
  game.debris=game.debris.filter(d=>d.life>0);
}

function drawDebris(){
  ctx.fillStyle="#aaa";
  for(let d of game.debris){
    ctx.fillRect(d.x,d.y,3,3);
  }
}

/* BG */
const imgs={
 sun:new Image(),
 nebula:new Image(),
 meteor:new Image(),
 meteor1:new Image()
};
imgs.sun.src="image/sun.png";
imgs.nebula.src="image/nebula.png";
imgs.meteor.src="image/meteor.png";
imgs.meteor1.src="image/meteor1.png";

function spawnBG(){
 if(game.bgObject) return;
 let keys=Object.keys(imgs);
 let key=keys[Math.floor(Math.random()*keys.length)];
 game.bgObject={img:imgs[key],x:Math.random()*canvas.width,y:-200,size:200+Math.random()*200};
}
setInterval(spawnBG,4000);

function updateBG(){
 if(!game.bgObject) return;
 game.bgObject.y+=1;
 if(game.bgObject.y>canvas.height+200) game.bgObject=null;
}

function drawBG(){
 if(!game.bgObject) return;
 ctx.globalAlpha=0.6;
 ctx.drawImage(game.bgObject.img,game.bgObject.x,game.bgObject.y,game.bgObject.size,game.bgObject.size);
 ctx.globalAlpha=1;
}

/* GYRO */
function initGyro(){
 window.addEventListener("deviceorientation",(e)=>{
  game.targetX = canvas.width/2 + e.gamma*10;
 });
}

/* LOOP */
function loop(){
 if(!game.running){
  requestAnimationFrame(loop);
  return;
 }

 game.playerX += (game.targetX-game.playerX)*0.1;

 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 updateStars(); drawStars();
 updateBG(); drawBG();
 updateMeteors(); drawMeteors();
 updateBullets(); drawBullets();
 checkCollision();
 updateDebris(); drawDebris();

 document.getElementById("score").innerText=game.score;

 requestAnimationFrame(loop);
}
loop();

canvas.addEventListener("touchmove",(e)=>{
 game.targetX=e.touches[0].clientX;
});
</script>
</body>
</html>
